name: XGenius Match Radar

on:
  schedule:
    # GitHub Actions utilise l'UTC. On lance à 06:17 et 07:17 UTC,
    # puis le script ne continue que si l'heure locale à Paris est 08:17.
    # Cela couvre automatiquement heure d'été et heure d'hiver.
    - cron: "17 6,7 * * 1,4"
  workflow_dispatch:
    inputs:
      mode:
        description: "Traitement à lancer"
        required: true
        default: "monday"
        type: choice
        options:
          - monday
          - thursday
      dry_run:
        description: "Afficher les messages sans les envoyer sur Telegram"
        required: true
        default: true
        type: boolean

concurrency:
  group: xgenius-match-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Déterminer le mode d'exécution
        id: schedule
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "dry=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            python -c 'from datetime import datetime; from zoneinfo import ZoneInfo; now=datetime.now(ZoneInfo("Europe/Paris")); mode="monday" if now.weekday()==0 else "thursday" if now.weekday()==3 else "skip"; should="true" if mode!="skip" and now.hour==8 else "false"; print(f"mode={mode}"); print("dry=false"); print(f"run={should}"); print(f"local_time={now.isoformat()}")' >> "$GITHUB_OUTPUT"
          fi

      - name: Afficher le contexte
        run: |
          echo "Mode=${{ steps.schedule.outputs.mode }}"
          echo "Dry run=${{ steps.schedule.outputs.dry }}"
          echo "Run=${{ steps.schedule.outputs.run }}"
          echo "Heure locale=${{ steps.schedule.outputs.local_time }}"

      - name: Lancer XGenius
        if: steps.schedule.outputs.run == 'true'
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_RADAR_MATCHES: "5"
          MAX_PREDICTIONS_PER_RUN: "70"
        shell: bash
        run: |
          DRY_RUN="${{ steps.schedule.outputs.dry }}" python main.py --mode "${{ steps.schedule.outputs.mode }}"
